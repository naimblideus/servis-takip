name: Auto Deploy (Coolify)

# Her main push'unda Coolify'ın deploy webhook'unu tetikler → Coolify otomatik build+deploy eder.
# Sunucuda build (swap ile çalışıyor); GHCR/izin gerektirmez.
#
# TEK KURULUM (bir kez):
#   1) Coolify → servis-takip uygulaması → "Webhooks" (veya API token) → deploy URL'sini al.
#      - Per-resource webhook ise: tam URL (POST).
#      - Coolify API ise: https://<coolify>/api/v1/deploy?uuid=<uuid>  + bir API token.
#   2) GitHub → repo → Settings → Secrets and variables → Actions → New repository secret:
#        COOLIFY_WEBHOOK = (yukarıdaki URL)
#        COOLIFY_TOKEN   = (yalnız Coolify API kullanıyorsan; per-resource webhook'ta GEREKMEZ)
#   3) Bitti. Bundan sonra her push otomatik deploy eder. (Secret yoksa adım sessizce atlanır, hata vermez.)

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: coolify-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Coolify deploy tetikle
        env:
          HOOK: ${{ secrets.COOLIFY_WEBHOOK }}
          TOKEN: ${{ secrets.COOLIFY_TOKEN }}
        run: |
          if [ -z "$HOOK" ]; then
            echo "COOLIFY_WEBHOOK secret henüz eklenmemiş — otomatik deploy pasif. (Kurulum için workflow başlığındaki adımlar.)"
            exit 0
          fi
          if [ -n "$TOKEN" ]; then
            echo "Coolify API (Bearer) ile tetikleniyor..."
            curl -fsSL "$HOOK" -H "Authorization: Bearer $TOKEN"
          else
            echo "Per-resource webhook (POST) ile tetikleniyor..."
            curl -fsSL -X POST "$HOOK"
          fi
          echo ""
          echo "✓ Coolify deploy tetiklendi."

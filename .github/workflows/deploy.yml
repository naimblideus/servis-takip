name: Build & Deploy

# main'e her push'ta: Docker image'i CI'da (sunucu DIŞINDA) derle → GHCR'a yükle → Coolify'a deploy webhook.
# Sonuç: sunucuda build YOK (OOM biter), elle redeploy YOK.
#
# Kurulum (tek seferlik):
#  1) GHCR otomatik (GITHUB_TOKEN ile). Paket görünürlüğü gerekiyorsa GitHub > Packages > visibility.
#  2) Coolify uygulamasını "Docker Image" kaynağına çevir: ghcr.io/naimblideus/servis-takip:latest
#     (private ise Coolify'a GHCR pull kimliği ekle).
#  3) Coolify'ın "Deploy Webhook" URL'sini GitHub repo Secret olarak ekle: COOLIFY_WEBHOOK
#     (yoksa adım atlanır; image yine GHCR'da hazır olur, elle deploy edebilirsin).

# NOT: Şimdilik yalnız ELLE çalışır (Actions sekmesi → Run workflow). Otomatik push tetiği,
# Coolify "Docker Image" kaynağına çevrilip COOLIFY_WEBHOOK eklendikten SONRA aşağıdaki
# "push" bloğu yorumdan çıkarılarak aktifleştirilir. (Aksi halde her push'ta GHCR push denenir.)
on:
  workflow_dispatch: {}
  # push:
  #   branches: [main]

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Repo adını küçük harfe çevir (GHCR gereği)
        id: img
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.img.outputs.name }}:latest
            ${{ steps.img.outputs.name }}:${{ github.sha }}

      - name: Coolify deploy webhook
        env:
          HOOK: ${{ secrets.COOLIFY_WEBHOOK }}
        run: |
          if [ -n "$HOOK" ]; then
            curl -fsSL -X POST "$HOOK" && echo "Coolify deploy tetiklendi"
          else
            echo "COOLIFY_WEBHOOK secret yok — image GHCR'da hazır, Coolify'dan elle deploy edebilirsin."
          fi
